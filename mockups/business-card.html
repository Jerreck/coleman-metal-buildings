<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Business Card — Coleman Metal Buildings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100vh; background: #d4d1c8; padding: 64px; display:flex; align-items: center; justify-content: center; gap: 56px; flex-wrap: wrap; -webkit-font-smoothing: antialiased; font-family: var(--font-body); }
  .stack { display:flex; flex-direction: column; gap: 18px; align-items: center; }
  .stack .cap { font-family: var(--font-rail); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.22em; color: #444; }

  /* US business card 3.5 × 2 inches at ~150dpi for screen */
  .card {
    width: 560px; height: 320px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,.4), 0 8px 18px rgba(0,0,0,.18);
    position: relative;
    overflow: hidden;
  }

  /* FRONT */
  .front {
    background: var(--cream);
    color: var(--ink);
    padding: 32px 36px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .front .stripe-top { position: absolute; top: 0; left: 0; right: 0; height: 8px; background: var(--barn-red); }
  .front .top { display:flex; justify-content: space-between; align-items: flex-start; }
  .front .wordmark { font-family: var(--font-display); font-size: 56px; line-height: 0.95; letter-spacing: -0.015em; }
  .front .since { width: 88px; height: 88px; }
  .front .sub { font-family: var(--font-rail); font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 0.22em; color: var(--barn-red); margin-top: 4px; }
  .front .underline { height: 2px; background: var(--ink); margin-top: 18px; }
  .front .foot { display:flex; justify-content: space-between; align-items: flex-end; }
  .front .foot .left { font-family: var(--font-rail); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.18em; line-height: 1.6; }
  .front .foot .right { font-family: var(--font-display); font-size: 28px; letter-spacing: -0.01em; text-align: right; }
  .front .foot .right small { display:block; font-family: var(--font-rail); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.22em; color: var(--steel); margin-top: 4px; }

  /* BACK */
  .back {
    background: var(--ink); color: var(--cream);
    padding: 32px 36px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .back .stripe-top { position: absolute; top: 0; left: 0; right: 0; height: 8px; background: var(--barn-red); }
  .back .name-block .name { font-family: var(--font-display); font-size: 38px; line-height: 1; letter-spacing: -0.01em; color: var(--cream); }
  .back .name-block .role { font-family: var(--font-rail); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.22em; color: var(--barn-red); margin-top: 8px; }
  .back .underline { height: 1px; background: #2a2d33; margin: 18px 0; }
  .back .contact { display: grid; grid-template-columns: auto 1fr; gap: 8px 14px; font-family: var(--font-body); font-size: 14px; color: var(--cream); }
  .back .contact .lab { font-family: var(--font-rail); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.20em; color: var(--steel-light); align-self: center; }
  .back .stripe-bot { height: 8px; background: var(--barn-red); margin: 14px -36px -32px; }
</style></head>
<body>

<div class="stack">
  <div class="card front">
    <div class="stripe-top"></div>
    <div class="top">
      <div>
        <div class="wordmark">COLEMAN</div>
        <div class="sub">METAL BUILDINGS</div>
      </div>
      <img class="since" src="../assets/seal-since.svg" alt="Since 2014">
    </div>
    <div>
      <div class="underline"></div>
      <div class="foot" style="margin-top: 18px;">
        <div class="left">CUSTOM<br>METAL<br>BUILDINGS</div>
        <div class="right">(580) 555-0142<small>COLEMANMETAL.COM</small></div>
      </div>
    </div>
  </div>
  <div class="cap">Front · 3.5″ × 2″</div>
</div>

<div class="stack">
  <div class="card back">
    <div class="stripe-top"></div>
    <div class="name-block">
      <div class="name">Jess Coleman</div>
      <div class="role">Owner · Project Lead</div>
    </div>
    <div>
      <div class="underline"></div>
      <div class="contact">
        <div class="lab">Mobile</div><div>(580) 555-0142</div>
        <div class="lab">Email</div><div>jess@colemanmetal.com</div>
        <div class="lab">Office</div><div>1234 Hwy 70 E · Kingston, OK 73439</div>
      </div>
    </div>
    <div class="stripe-bot"></div>
  </div>
  <div class="cap">Back · Crew member edition</div>
</div>

</body></html>
