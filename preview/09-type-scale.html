<!doctype html><html><head><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  .wrap { padding: 22px 32px; display:flex; flex-direction:column; gap: 4px; }
  .row { display:grid; grid-template-columns: 80px 1fr 80px; align-items: baseline; padding: 6px 0; border-bottom: 1px solid var(--steel-light); }
  .row:last-child { border-bottom: 0; }
  .tag { font-family: var(--font-rail); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.18em; color: var(--barn-red); }
  .size { font-family: var(--font-mono); font-size: 11px; color: var(--steel); text-align: right; }
  .spec-display { font-family: var(--font-display); color: var(--ink); letter-spacing: -0.01em; line-height: 1.05; }
  .spec-rail    { font-family: var(--font-rail); font-weight:600; text-transform: uppercase; letter-spacing: 0.10em; color: var(--ink); }
  .spec-body    { font-family: var(--font-body); color: var(--ink); }
</style></head>
<body>
<div class="card-frame cream">
  <div class="wrap">
    <div class="row"><div class="tag">Mega</div><div class="spec-display" style="font-size:48px">Built to last</div><div class="size">112 / 1.02</div></div>
    <div class="row"><div class="tag">Hero</div><div class="spec-display" style="font-size:36px">Custom metal buildings</div><div class="size">72 / 1.02</div></div>
    <div class="row"><div class="tag">H1</div><div class="spec-display" style="font-size:28px">Pole barns &amp; shops</div><div class="size">56 / 1.12</div></div>
    <div class="row"><div class="tag">H3</div><div class="spec-rail" style="font-size:18px">SERVICES</div><div class="size">24 / 1.25</div></div>
    <div class="row"><div class="tag">Body</div><div class="spec-body" style="font-size:16px">Engineered to wind &amp; snow loads.</div><div class="size">16 / 1.55</div></div>
    <div class="row"><div class="tag">Small</div><div class="spec-body" style="font-size:13px; color:var(--steel)">Since 2014 · Kingston, Oklahoma</div><div class="size">14 / 1.55</div></div>
  </div>
</div>
</body></html>
