<!doctype html><html><head><meta charset="utf-8"><title>Extended palette</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0; height: 180px; }
  .sw { padding: 14px 14px; display:flex; flex-direction:column; justify-content: space-between; }
  .name { font-family: var(--font-rail); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; }
  .hex  { font-family: var(--font-mono); font-size: 11px; opacity: .8; }
  .role { font-family: var(--font-body); font-size: 11px; opacity: .85; line-height: 1.35; }
</style></head>
<body>
<div class="card-frame cream" style="padding:0">
  <div class="grid">
    <div class="sw" style="background: var(--ink-soft); color: var(--cream);">
      <div class="name">Ink Soft</div>
      <div><div class="role">Cards on ink</div><div class="hex">#2A2D33</div></div>
    </div>
    <div class="sw" style="background: var(--rust); color: var(--cream);">
      <div class="name">Rust</div>
      <div><div class="role">CTA pressed</div><div class="hex">#8A2818</div></div>
    </div>
    <div class="sw" style="background: var(--bone); color: var(--ink); border-right: 1px solid var(--steel-light);">
      <div class="name">Bone</div>
      <div><div class="role">Card on cream</div><div class="hex">#F7F2E6</div></div>
    </div>
    <div class="sw" style="background: var(--patina); color: var(--cream);">
      <div class="name">Patina</div>
      <div><div class="role">Cool accent</div><div class="hex">#3A4A52</div></div>
    </div>
    <div class="sw" style="background: var(--gold); color: var(--ink);">
      <div class="name">Gold</div>
      <div><div class="role">Seals only</div><div class="hex">#C89545</div></div>
    </div>
    <div class="sw" style="background: var(--steel-light); color: var(--ink);">
      <div class="name">Steel Lt</div>
      <div><div class="role">Hairlines</div><div class="hex">#A8B0B8</div></div>
    </div>
  </div>
</div>
</body></html>
