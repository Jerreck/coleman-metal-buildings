<!doctype html><html><head><meta charset="utf-8"><title>Display type</title>
<link rel="stylesheet" href="_card.css">
<style>
  .wrap { padding: 24px 32px 28px; }
  .meta { display:flex; gap: 24px; font-family: var(--font-rail); font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--steel); margin-bottom: 14px; }
  .meta b { color: var(--ink); }
  .spec { font-family: var(--font-display); font-size: 84px; line-height: 0.98; letter-spacing: -0.01em; color: var(--ink); margin: 0; }
  .sub  { font-family: var(--font-rail); font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.18em; color: var(--barn-red); margin-top: 10px; }
</style></head>
<body>
<div class="card-frame cream">
  <div class="wrap">
    <div class="meta"><span><b>Display</b></span><span>Alfa Slab One</span><span>regular · 400</span><span>tracking −0.01em</span></div>
    <h2 class="spec">Engineered to last.</h2>
    <div class="sub">Hero headlines · yard signs · the wordmark</div>
  </div>
</div>
</body></html>
