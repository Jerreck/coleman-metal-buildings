<!doctype html><html><head><meta charset="utf-8"><title>Primary palette</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr 0.9fr; gap: 0; height: 220px; }
  .sw { padding: 16px 18px; display:flex; flex-direction:column; justify-content: space-between; }
  .name { font-family: var(--font-rail); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.18em; }
  .hex  { font-family: var(--font-mono); font-size: 12px; opacity: .85; }
  .role { font-family: var(--font-body); font-size: 12px; opacity: .85; line-height: 1.4; }
</style></head>
<body>
<div class="card-frame cream" style="padding:0">
  <div class="grid">
    <div class="sw" style="background: var(--ink); color: var(--cream);">
      <div class="name">Ink</div>
      <div><div class="role">Primary dark surface</div><div class="hex">#15171A</div></div>
    </div>
    <div class="sw" style="background: var(--barn-red); color: var(--cream);">
      <div class="name">Barn Red</div>
      <div><div class="role">The accent</div><div class="hex">#B8351E</div></div>
    </div>
    <div class="sw" style="background: var(--cream); color: var(--ink); border-right: 1px solid var(--steel-light);">
      <div class="name">Cream</div>
      <div><div class="role">Page ground</div><div class="hex">#EFE8D7</div></div>
    </div>
    <div class="sw" style="background: var(--steel); color: var(--cream);">
      <div class="name">Steel</div>
      <div><div class="role">Secondary</div><div class="hex">#6B7280</div></div>
    </div>
  </div>
</div>
</body></html>
