<!doctype html><html><head><meta charset="utf-8"><title>Marks & Seals</title>
<link rel="stylesheet" href="_card.css">
<style>
  .wrap { display:flex; align-items:center; justify-content:space-around; padding: 28px 32px; gap: 24px; }
  .item { display:flex; flex-direction:column; align-items:center; gap: 10px; }
  .item img { width: 132px; height: 132px; display:block; }
  .label { font-family: var(--font-rail); font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--ink); }
  .sub   { font-family: var(--font-body); font-size: 11px; color: var(--steel); }
</style></head>
<body>
<div class="card-frame cream">
  <div class="wrap">
    <div class="item">
      <img src="../assets/mark-cm.svg">
      <div class="label">CM Monogram</div>
      <div class="sub">Avatars · favicon · stamp</div>
    </div>
    <div class="item">
      <img src="../assets/seal-warranty.svg">
      <div class="label">40-Yr Warranty Seal</div>
      <div class="sub">Quote packets only</div>
    </div>
    <div class="item">
      <img src="../assets/seal-since.svg">
      <div class="label">Since-2014 Seal</div>
      <div class="sub">Footer · packets · cards</div>
    </div>
  </div>
</div>
</body></html>
