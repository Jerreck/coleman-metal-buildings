<!doctype html><html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="_card.css">
<style>
  .wrap { padding: 26px 32px; display:flex; flex-direction:column; gap: 8px; }
  .row { display:grid; grid-template-columns: 60px 60px 1fr; gap: 16px; align-items: center; }
  .tag { font-family: var(--font-rail); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.18em; color: var(--barn-red); }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--steel); }
  .bar { height: 12px; background: var(--ink); }
</style></head>
<body>
<div class="card-frame cream">
  <div class="wrap">
    <div class="row"><span class="tag">s-1</span><span class="val">4px</span><div class="bar" style="width: 4px"></div></div>
    <div class="row"><span class="tag">s-2</span><span class="val">8px</span><div class="bar" style="width: 8px"></div></div>
    <div class="row"><span class="tag">s-3</span><span class="val">12px</span><div class="bar" style="width: 12px"></div></div>
    <div class="row"><span class="tag">s-4</span><span class="val">16px</span><div class="bar" style="width: 16px"></div></div>
    <div class="row"><span class="tag">s-5</span><span class="val">24px</span><div class="bar" style="width: 24px"></div></div>
    <div class="row"><span class="tag">s-6</span><span class="val">32px</span><div class="bar" style="width: 32px"></div></div>
    <div class="row"><span class="tag">s-7</span><span class="val">48px</span><div class="bar" style="width: 48px"></div></div>
    <div class="row"><span class="tag">s-8</span><span class="val">64px</span><div class="bar" style="width: 64px"></div></div>
    <div class="row"><span class="tag">s-9</span><span class="val">96px</span><div class="bar" style="width: 96px"></div></div>
    <div class="row"><span class="tag">s-10</span><span class="val">128px</span><div class="bar" style="width: 128px"></div></div>
  </div>
</div>
</body></html>
