<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_card.css">
<style>
  .wrap { padding: 28px 32px; display:flex; flex-wrap: wrap; gap: 14px 18px; align-items: center; }
  .row-label { width:100%; font-family: var(--font-rail); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.18em; color: var(--steel); margin-top: 6px; }
</style></head>
<body>
<div class="card-frame cream">
  <div class="wrap">
    <div class="row-label">Primary &amp; dark — calls to action</div>
    <a class="btn btn-primary">Request a Quote →</a>
    <a class="btn btn-primary" style="background: var(--rust)">Hover · #8A2818</a>
    <a class="btn btn-dark">Talk to a Builder</a>

    <div class="row-label">Ghost — secondary actions</div>
    <a class="btn btn-ghost">View Gallery</a>
    <a class="btn btn-ghost-light" style="background:#15171a">On Dark</a>
  </div>
</div>
</body></html>
