<!doctype html><html><head><meta charset="utf-8"><title>Photography treatment</title>
<link rel="stylesheet" href="_card.css">
<style>
  .wrap { padding: 0; display: grid; grid-template-columns: 1.4fr 1fr; gap: 0; min-height: 240px; }
  .photo {
    position: relative;
    background:
      linear-gradient(180deg, rgba(21,23,26,.0) 40%, rgba(21,23,26,.55) 100%),
      linear-gradient(135deg, #c89545 0%, #8a6021 38%, #3a4a52 70%, #15171a 100%);
    color: var(--cream);
    padding: 28px 32px;
    display:flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .ph-mark { font-family: var(--font-rail); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.22em; color: var(--cream); opacity: .75; }
  .stripe { height: 6px; background: var(--barn-red); margin-top: 8px; }
  .title { font-family: var(--font-display); font-size: 36px; line-height: 1.02; letter-spacing: -0.01em; max-width: 80%; }
  .notes { padding: 24px 28px; background: var(--cream); }
  .notes h4 { font-family: var(--font-rail); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--barn-red); margin: 0 0 12px; }
  .notes ul { margin: 0; padding-left: 14px; font-family: var(--font-body); font-size: 13px; line-height: 1.6; color: var(--ink); }
  .notes ul li { margin-bottom: 4px; list-style: none; position: relative; padding-left: 6px; }
  .notes ul li::before { content:""; position:absolute; left: -8px; top: 8px; width: 6px; height: 6px; background: var(--barn-red); }
</style></head>
<body>
<div class="card-frame cream" style="padding:0">
  <div class="wrap">
    <div class="photo">
      <div class="ph-mark">PHOTO TREATMENT · GOLDEN-HOUR</div>
      <div>
        <div class="title">40×60 shop, just outside Madill.</div>
        <div class="stripe"></div>
      </div>
    </div>
    <div class="notes">
      <h4>Photo Rules</h4>
      <ul>
        <li>Warm, golden-hour, slightly desaturated</li>
        <li>Wide horizons — building in landscape</li>
        <li>Real customers, real Carhartts</li>
        <li>Full-bleed hero; 4:5 or 16:9 in cards</li>
        <li>Never rounded above 4px</li>
      </ul>
    </div>
  </div>
</div>
</body></html>
